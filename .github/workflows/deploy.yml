name: Deploy Lambdas

on:
  push:
    branches: [main]
    paths:
      - 'lambdas/**'
      - 'utils/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Package helper — creates zip with lambda_function.py + utils/
      - name: Package all Lambdas
        run: |
          package() {
            local name="$1"
            local source="$2"
            mkdir -p "/tmp/deploy/$name"
            cp "$source" "/tmp/deploy/$name/lambda_function.py"
            cp -r utils "/tmp/deploy/$name/utils"
            cd "/tmp/deploy/$name" && zip -r "/tmp/omnidesk-$name.zip" .
            cd "$GITHUB_WORKSPACE"
          }

          # Auth
          package "auth-register" "lambdas/auth/register.py"
          package "auth-login" "lambdas/auth/login.py"
          package "auth-me" "lambdas/auth/me.py"

          # MCP Server (needs utils for DB, JWT, audit)
          package "mcp-server" "lambdas/mcp/server.py"

          # Categories
          package "categories" "lambdas/categories/handler.py"

          # Products
          package "product-create" "lambdas/products/create.py"
          package "product-list" "lambdas/products/list_get.py"
          package "product-update" "lambdas/products/update.py"
          package "product-search" "lambdas/products/search.py"

          # Warehouses
          package "warehouses" "lambdas/warehouses/handler.py"

          # Stock
          package "stock-check" "lambdas/stock/check.py"
          package "stock-adjust" "lambdas/stock/adjust.py"
          package "stock-low" "lambdas/stock/low_alerts.py"
          package "stock-movements" "lambdas/stock/movements.py"

          # Orders
          package "order-create" "lambdas/orders/create.py"
          package "order-list" "lambdas/orders/list_get.py"
          package "order-status" "lambdas/orders/update_status.py"
          package "order-history" "lambdas/orders/history.py"

          # Invoices
          package "invoice-generate" "lambdas/invoices/generate.py"
          package "invoice-list" "lambdas/invoices/list_get.py"
          package "invoice-download" "lambdas/invoices/download.py"
          package "invoice-send" "lambdas/invoices/send.py"

      # Deploy all functions
      - name: Deploy all Lambdas
        run: |
          deploy() {
            echo "Deploying omnidesk-$1..."
            aws lambda update-function-code \
              --function-name "omnidesk-$1" \
              --zip-file "fileb:///tmp/omnidesk-$1.zip"
          }

          deploy auth-register
          deploy auth-login
          deploy auth-me
          deploy mcp-server
          deploy categories
          deploy product-create
          deploy product-list
          deploy product-update
          deploy product-search
          deploy warehouses
          deploy stock-check
          deploy stock-adjust
          deploy stock-low
          deploy stock-movements
          deploy order-create
          deploy order-list
          deploy order-status
          deploy order-history
          deploy invoice-generate
          deploy invoice-list
          deploy invoice-download
          deploy invoice-send
